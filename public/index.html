<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Iron Man AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- MENU A TENDINA PER CHAT -->
    <div class="sidebar">
        <div class="conversations-header">
            <h3>💬 STORICO CHAT</h3>
            <button onclick="window.jarvis.createNewChat()" class="new-chat-btn">+ NUOVA</button>
        </div>
        <select id="conversationsDropdown" class="conversations-dropdown" onchange="window.jarvis.loadConversationFromDropdown(this.value)">
            <option value="">-- Seleziona una conversazione --</option>
        </select>
        <div id="conversationsList"></div>
    </div>

    <!-- CONTENUTO PRINCIPALE -->
    <div class="main-content">
        <div class="scan-line"></div>
        <div class="container">
            <div class="header">
                <div class="glow-text">J.A.R.V.I.S.</div>
                <div class="subtitle">Just A Rather Very Intelligent System</div>
                <div class="status-indicator">
                    <span class="status-led"></span>
                    <span class="status-text">SISTEMA ONLINE</span>
                </div>
                <div class="creator-badge">Creato da Antonio Pepice</div>
            </div>

            <div class="hologram-container">
                <div class="hologram-circle"></div>
                <div class="hologram-circle-2"></div>
                <div class="hologram-circle-3"></div>
                <div class="hologram-core"></div>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                
                <div class="input-container">
                    <button id="micBtn" class="mic-button" onclick="window.jarvis.startListening()">
                        🎤
                    </button>
                    
                    <label for="fileInput" class="file-button">
                        📎
                    </label>
                    <input type="file" id="fileInput" style="display: none;" onchange="window.jarvis.uploadFile(this.files[0])">
                    
                    <textarea id="userInput" placeholder="Scrivi o parla..." rows="1"></textarea>
                    
                    <button id="sendBtn" class="send-button">
                        <div class="button-glow"></div>
                        INVIA
                    </button>
                </div>
            </div>

            <div class="capabilities-panel">
                <div class="panel-title">CAPACITÀ</div>
                <div class="capabilities-grid">
                    <div class="capability">⚡ CODICE</div>
                    <div class="capability">🌍 TRADUZIONE</div>
                    <div class="capability">📝 RIASSUNTO</div>
                    <div class="capability">🐛 DEBUG</div>
                    <div class="capability">🎓 STUDIO</div>
                    <div class="capability">💡 CREATIVITÀ</div>
                    <div class="capability">📊 ANALISI</div>
                    <div class="capability">🔊 VOCE</div>
                    <div class="capability">🎤 MICROFONO</div>
                    <div class="capability">📎 FILE</div>
                </div>
            </div>
        </div>
    </div>

    <div id="speakingIndicator" class="speaking-indicator" style="display: none;">
        🔴 JARVIS STA PARLANDO...
    </div>
    
    <div id="listeningIndicator" class="listening-indicator" style="display: none;">
        🎤 IN ASCOLTO...
    </div>

    <script src="js/app.js"></script>
</body>
</html>
