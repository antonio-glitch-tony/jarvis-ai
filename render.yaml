services:
  - type: web
    name: barry-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20.19.6
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths:
        - src/**
        - public/**
        - package.json
        - server.js